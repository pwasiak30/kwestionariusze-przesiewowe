<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Narzędzia Przesiewowe | Psychodiagnostyka</title>
<meta name="description" content="Kwestionariusze przesiewowe z automatycznym scoringiem: GAD-7, PHQ-9, PCL-5, BDI-II, AUDIT.">
<meta name="theme-color" content="#0292A9">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

  <!-- ============ TOP BAR (mobile) / SIDEBAR (desktop) ============ -->
  <header class="topbar">
    <div class="brand" data-action="go-home">
      <span class="brand-mark">◎</span>
      <span class="brand-text">Narzędzia&nbsp;Przesiewowe</span>
    </div>
    <button class="icon-btn" id="offlineIndicator" title="Status połączenia" aria-label="Status połączenia">
      <span id="offlineDot" class="dot dot-online"></span>
    </button>
  </header>

  <nav class="sidebar" aria-label="Nawigacja główna">
    <div class="brand sidebar-brand" data-action="go-home">
      <span class="brand-mark">◎</span>
      <span class="brand-text">Narzędzia<br>Przesiewowe</span>
    </div>
    <div class="sidebar-list" id="sidebarList"><!-- injected --></div>
    <div class="sidebar-footer">
      <span id="offlineDotSidebar" class="dot dot-online"></span>
      <span id="offlineTextSidebar">Połączono</span>
    </div>
  </nav>

  <!-- ============ MAIN CONTENT ============ -->
  <main class="content" id="content">
    <!-- Views injected by app.js -->
  </main>

  <!-- ============ BOTTOM NAV (mobile only) ============ -->
  <nav class="bottombar" id="bottombar" aria-label="Szybka nawigacja"></nav>

</div>

<template id="tpl-home">
  <section class="view view-home">
    <div class="hero">
      <h1>Kwestionariusze&nbsp;przesiewowe</h1>
      <p>Wypełnij, a aplikacja automatycznie policzy wynik i przedstawi interpretację zgodną z przyjętymi progami klinicznymi. Działa również offline.</p>
    </div>
    <div class="card-grid" id="questCards"><!-- injected --></div>
    <p class="disclaimer">
      Narzędzia mają charakter przesiewowy i psychoedukacyjny. Nie zastępują diagnozy klinicznej postawionej przez uprawnionego specjalistę.
      Wyniki nie są nigdzie wysyłane ani zapisywane poza urządzeniem, na którym uzupełniany jest kwestionariusz.
    </p>
  </section>
</template>

<template id="tpl-quest">
  <section class="view view-quest">
    <button class="back-btn" data-action="go-home">← Powrót do listy narzędzi</button>
    <div class="quest-header">
      <h1 id="questTitle"></h1>
      <p id="questDesc"></p>
      <p class="instructions" id="questInstructions"></p>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>
    <form id="questForm" class="quest-form"></form>
    <div class="quest-actions">
      <button type="button" class="btn btn-primary" id="submitBtn" disabled>Oblicz wynik</button>
    </div>
  </section>
</template>

<template id="tpl-result">
  <section class="view view-result">
    <button class="back-btn" data-action="go-home">← Powrót do listy narzędzi</button>
    <div class="result-card" id="resultCard"></div>
    <div class="quest-actions">
      <button type="button" class="btn btn-secondary" id="printBtn">Drukuj / zapisz PDF</button>
      <button type="button" class="btn btn-primary" id="retryBtn">Wypełnij ponownie</button>
    </div>
  </section>
</template>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
